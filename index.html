<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json"> <!-- Untuk PWA -->
    
    <!-- Load pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <header>
        <h2>📚 Novel Reader</h2>
        <button id="btn-select-folder">Pilih Folder Novel</button>
        <button id="btn-back" style="display:none;">⬅ Kembali ke Daftar</button>
    </header>

    <!-- Tampilan Daftar File/Folder -->
    <main id="library-view">
        <div id="search-container" class="search-container" style="display: none;">
            <input type="text" id="search-box" placeholder="🔍 Cari chapter...">
        </div>

        <div id="file-list" class="grid-container">
            <p>Buka folder PDF novel.</p>
        </div>
    </main>

    <!-- Tampilan Membaca -->
    <main id="reader-view" style="display:none;">
        <div class="controls">
            <button id="prev-btn">◀ Prev Chapter</button>
            <span id="page-info"><strong id="chapter-title">Judul Chapter</strong></span>
            <button id="next-btn">Next Chapter ▶</button>
        </div>
        
        <div id="pdf-container" class="canvas-container">
            </div>
    </main>

    <!-- Inisialisasi worker pdf.js -->
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="app.js"></script>
</body>
</html>
